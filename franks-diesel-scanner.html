<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{background:#F2F0ED;font-family:'Arial Narrow',Arial,sans-serif;max-width:480px;margin:0 auto;min-height:100vh}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;display:flex;align-items:flex-end;justify-content:center}
  .sheet{background:#1A1A1A;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px;border:1px solid #2A2A2A;border-bottom:none;max-height:88vh;overflow-y:auto}
  .sheet-title{font-size:16px;font-weight:900;color:#FF6B35;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
  .lbl{font-size:10px;color:#777;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
  .inp{width:100%;padding:11px 12px;background:#111;border:1px solid #3A3A3A;border-radius:8px;color:#EEE8E0;font-size:14px}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:8px;display:block;text-align:center}
  .btn-orange{background:#FF6B35}
  .btn-dark{background:#2A2A2A}
  .btn-green{background:#2A4A2A}
  .btn-dim{background:#2A2A2A;color:#555;cursor:default}
  .chip{padding:5px 10px;border-radius:20px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 10px 90px}
  .tile{background:#fff;border:2px solid #E8E4E0;border-radius:14px;padding:16px 6px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;min-height:105px;width:100%}
  .badge{position:absolute;top:7px;right:7px;border-radius:10px;font-size:9px;font-weight:900;padding:2px 6px;line-height:1.4;color:#000}
  .tile-icon{font-size:32px}
  .tile-label{font-size:11px;font-weight:700;color:#333;text-align:center;line-height:1.3}
  .tile-amt{font-size:10px;font-weight:700}
  .tile-tap{font-size:10px;color:#CCC}
  .receipt-row{border-radius:8px;padding:10px 12px;margin-bottom:5px;border-left:3px solid}
  .divider{display:flex;align-items:center;gap:8px;color:#333;margin-bottom:14px}
  .divider-line{flex:1;height:1px;background:#2A2A2A}
  .divider-txt{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555}
  .cat-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
  .stat-strip{background:#222;display:flex;padding:10px 14px;gap:8px;border-bottom:1px solid #2A2A2A}
  .stat-box{flex:1}
  .stat-lbl{font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase}
  .stat-val{font-size:18px;font-weight:900}
  .stat-sub{font-size:9px;color:#444}
  .divider-v{width:1px;background:#333}
  .preview-box{background:#111;border-radius:8px;padding:14px;margin-bottom:16px}
  .preview-row{display:flex;justify-content:space-between;margin-bottom:6px}
  .scanning-spinner{font-size:28px;display:inline-block;animation:spin 1s linear infinite}
  .scan-result{background:#0D2010;border:1px solid #4ECDC4;border-radius:8px;padding:12px;margin-bottom:14px}
  .filter-row{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  /* File input label trick - fully visible, no hidden inputs */
  .file-label{position:relative;display:block;width:100%;padding:13px;border-radius:10px;color:#fff;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:8px;text-align:center}
  .file-label input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.01;cursor:pointer;font-size:16px}
</style>
</head>

    <div class="divider-v"></div>
    <div class="stat-box" style="display:flex;align-items:center;justify-content:center">
      <button onclick="openEmail()" style="background:#0E1A0E;border:1px solid #2A5A2A;border-radius:8px;color:#4ECDC4;padding:8px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;line-height:1.3;width:100%">📬 Email<br>Sherry</button>
    </div>
  </div>

  <div style="padding:12px 16px 6px;font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;font-weight:700">Tap a Category to Add Receipt</div>

  <div class="grid">`;

  CATS.forEach(c=>{
    const tot = catTotal(c.id);
    const cnt = catCount(c.id);
    html += `<button class="tile" onclick="openAdd('${c.id}')">
      ${cnt>0?`<div class="badge" style="background:${c.color}">${cnt}</div>`:''}
      <div class="tile-icon">${c.icon}</div>
      <div class="tile-label">${c.label}</div>
      ${tot>0?`<div class="tile-amt" style="color:${c.color}">${fmt(tot)}</div>`:`<div class="tile-tap">Tap to add</div>`}
    </button>`;
  });

  html += `</div>
  <button onclick="openAdd('fuel')" style="position:fixed;bottom:22px;right:22px;width:62px;height:62px;border-radius:31px;background:#FF6B35;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,53,0.5);display:flex;align-items:center;justify-content:center;z-index:50">📷</button>`;

  // ── Modals ──
  if(modal==='scan') html += renderScan();
  if(modal==='add')  html += renderAdd();
  if(modal==='email') html += renderEmail();
  if(modal==='list') html += renderList();

  document.getElementById('app').innerHTML = html;
  bindFileInputs();
}

function renderScan(){
  const c = cat(addCat);
  let inner = '';
  if(scanStep==='pick'){
    inner = `
      <p style="font-size:13px;color:#888;margin-bottom:16px">Take a photo or choose from gallery — AI reads it automatically.</p>
      <label class="file-label" style="background:#FF6B35">
        📷 Take Photo
        <input type="file" accept="image/*" capture="environment" onchange="handleFile(this)">
      </label>
      <label class="file-label" style="background:#2A4A2A">
        🖼️ Choose from Gallery
        <input type="file" accept="image/*" onchange="handleFile(this)">
      </label>
      <button class="btn btn-dark" onclick="closeModal()">Cancel</button>`;
  } else if(scanStep==='scanning'){
    inner = `<div style="text-align:center;padding:20px 0">
      ${scanPreview?`<img src="${scanPreview}" style="width:100%;border-radius:8px;margin-bottom:14px;max-height:160px;object-fit:cover">`:''}
      <div class="scanning-spinner">⏳</div>
      <div style="color:#888;font-size:13px;margin-top:8px">Reading receipt with AI…</div>
    </div>`;
  } else if(scanStep==='done' && scanResult){
    inner = `
      ${scanPreview?`<img src="${scanPreview}" style="width:100%;border-radius:8px;margin-bottom:12px;max-height:130px;object-fit:cover">`:''}
      <div class="scan-result">
        <div style="color:#4ECDC4;font-weight:700;font-size:13px;margin-bottom:8px">✅ Receipt read!</div>
        ${scanResult.vendor?`<div style="font-size:13px;color:#CCC;margin-bottom:2px"><b style="color:#888">Vendor:</b> ${scanResult.vendor}</div>`:''}
        ${scanResult.amount?`<div style="font-size:13px;color:#CCC;margin-bottom:2px"><b style="color:#888">Amount:</b> ${fmt(scanResult.amount)}</div>`:''}
        ${scanResult.date?`<div style="font-size:13px;color:#CCC;margin-bottom:2px"><b style="color:#888">Date:</b> ${scanResult.date}</div>`:''}
        ${scanResult.notes?`<div style="font-size:13px;color:#CCC;margin-bottom:2px"><b style="color:#888">Notes:</b> ${scanResult.notes}</div>`:''}
      </div>
      <button class="btn btn-orange" onclick="saveScan()">✓ Save Receipt</button>
      <button class="btn btn-dark" onclick="scanStep='pick';render()">Scan Again</button>`;
  } else if(scanStep==='err'){
    inner = `
      <div style="color:#FF6B35;margin-bottom:14px;font-size:13px">⚠️ Couldn't read it. Try again with better lighting, or enter manually.</div>
      <button class="btn btn-orange" onclick="scanStep='pick';render()">Try Again</button>
      <button class="btn btn-dark" onclick="modal='add';render()">Enter Manually</button>`;
  }
  return `<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="sheet-title">📸 Scan Receipt</div>
        <button onclick="closeModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer">×</button>
      </div>
      <div style="font-size:12px;color:${c?.color};margin-bottom:14px;font-weight:700">${c?.icon} ${c?.label}</div>
      ${inner}
    </div>
  </div>`;
}

function renderAdd(){
  const c = cat(addForm.cat);
  const chips = CATS.map(ct=>`<button class="chip" style="background:${addForm.cat===ct.id?ct.color:'#2A2A2A'};color:${addForm.cat===ct.id?'#000':'#999'}" onclick="addForm.cat='${ct.id}';render()">${ct.icon} ${ct.label.split(' ')[0]}</button>`).join('');
  return `<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="sheet-title">Add Receipt</div>
        <button onclick="closeModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer">×</button>
      </div>
      <div style="font-size:12px;color:${c?.color};margin-bottom:14px;font-weight:700">${c?.icon} ${c?.label} · ${c?.ded?'✓ Tax Deductible':'Not Deductible'}</div>
      <button class="btn btn-orange" onclick="modal='scan';scanStep='pick';render()">📸 Scan Receipt with AI</button>
      <div class="divider"><div class="divider-line"></div><span class="divider-txt">or manual</span><div class="divider-line"></div></div>
      <div class="cat-chips">${chips}</div>
      <label class="lbl">Vendor / Location</label>
      <input class="inp" style="margin-bottom:10px" placeholder="e.g. Pilot Flying J" value="${addForm.vendor}" oninput="addForm.vendor=this.value">
      <label class="lbl">Amount ($)</label>
      <input class="inp" type="number" style="margin-bottom:10px" placeholder="0.00" value="${addForm.amount}" oninput="addForm.amount=this.value">
      <label class="lbl">Date</label>
      <input class="inp" type="date" style="margin-bottom:10px" value="${addForm.date}" oninput="addForm.date=this.value">
      <label class="lbl">Notes (optional)</label>
      <textarea class="inp" rows="2" style="resize:none;margin-bottom:16px" placeholder="e.g. 87 gal, Memphis TN" oninput="addForm.notes=this.value">${addForm.notes}</textarea>
      <button class="btn ${addForm.amount&&addForm.vendor?'btn-orange':'btn-dim'}" onclick="saveManual()">Save Receipt</button>
    </div>
  </div>`;
}

function renderEmail(){
  const yr = new Date().getFullYear();
  const q = QUARTERS[selQ];
  const qR = receipts.filter(r=>q.months.includes(new Date(r.date+'T12:00:00').getMonth()));
  const tot = qR.reduce((s,r)=>s+r.amount,0);
  const ded = qR.filter(r=>cat(r.cat)?.ded).reduce((s,r)=>s+r.amount,0);
  const opts = QUARTERS.map((q,i)=>`<option value="${i}" ${i===selQ?'selected':''}>${q.label} ${yr} — ${q.name}</option>`).join('');
  return `<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="sheet-title">📧 Email Sherry</div>
        <button onclick="closeModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer">×</button>
      </div>
      <div style="font-size:11px;color:#555;margin-bottom:16px">Cummins0524@outlook.com · Year Round Tax</div>
      <label class="lbl">Quarter</label>
      <select class="inp" style="margin-bottom:16px" onchange="selQ=parseInt(this.value);render()">${opts}</select>
      <div class="preview-box">
        <div style="font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Preview</div>
        <div class="preview-row"><span style="font-size:12px;color:#777">Receipts</span><span style="font-size:14px;font-weight:700;color:#EEE">${qR.length}</span></div>
        <div class="preview-row"><span style="font-size:12px;color:#777">Total</span><span style="font-size:14px;font-weight:700;color:#EEE">${fmt(tot)}</span></div>
        <div class="preview-row"><span style="font-size:12px;color:#777">Deductible</span><span style="font-size:14px;font-weight:700;color:#4ECDC4">${fmt(ded)}</span></div>
        <div class="preview-row"><span style="font-size:12px;color:#777">Est. Savings</span><span style="font-size:14px;font-weight:700;color:#FFE44D">${fmt(ded*0.25)}</span></div>
      </div>
      ${qR.length===0?`<div style="font-size:12px;color:#FF6B35;text-align:center;margin-bottom:12px">No receipts for ${q.label} yet</div>`:`<button class="btn btn-orange" onclick="sendEmail()">📧 Open Email to Sherry</button>`}
      <div style="font-size:11px;color:#555;text-align:center;margin-bottom:10px">Opens Gmail or Outlook — just hit Send</div>
      <button class="btn btn-dark" onclick="closeModal()">Close</button>
    </div>
  </div>`;
}

function renderList(){
  let filtered = filterCat==='all' ? receipts : receipts.filter(r=>r.cat===filterCat);
  if(searchTxt) filtered = filtered.filter(r=>r.vendor.toLowerCase().includes(searchTxt.toLowerCase())||r.notes.toLowerCase().includes(searchTxt.toLowerCase()));
  const tot = filtered.reduce((s,r)=>s+r.amount,0);
  const used = CATS.filter(c=>receipts.some(r=>r.cat===c.id));
  const chips = [`<button class="chip" style="background:${filterCat==='all'?'#FF6B35':'#2A2A2A'};color:#fff" onclick="filterCat='all';render()">All (${receipts.length})</button>`]
    .concat(used.map(c=>`<button class="chip" style="background:${filterCat===c.id?c.color:'#2A2A2A'};color:${filterCat===c.id?'#000':'#999'}" onclick="filterCat='${c.id}';render()">${c.icon} ${c.label.split(' ')[0]}</button>`)).join('');
  const rows = filtered.map((r,i)=>{
    const c = cat(r.cat);
    return `<div class="receipt-row" style="background:${i%2===0?'#1C1C1C':'#181818'};border-left-color:${c?.color||'#444'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:#EEE">${r.vendor}</div>
          <div style="font-size:10px;color:#555;margin-top:2px">${r.date} · <span style="color:${c?.color}">${c?.icon} ${c?.label}</span></div>
          ${r.notes?`<div style="font-size:11px;color:#666;margin-top:2px">${r.notes}</div>`:''}
          ${c?.ded?`<div style="font-size:9px;color:#4ECDC4;margin-top:2px">✓ TAX DEDUCTIBLE</div>`:''}
        </div>
        <div style="text-align:right;margin-left:10px">
          <div style="font-size:16px;font-weight:900;color:#EEE">${fmt(r.amount)}</div>
          <button onclick="deleteReceipt(${r.id})" style="font-size:10px;color:#555;background:none;border:none;cursor:pointer;padding:0;margin-top:3px">✕ remove</button>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="sheet-title">🧾 Receipts (${receipts.length})</div>
        <button onclick="closeModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer">×</button>
      </div>
      <input class="inp" style="margin-bottom:10px" placeholder="🔍 Search…" value="${searchTxt}" oninput="searchTxt=this.value;render()">
      <div class="filter-row">${chips}</div>
      <div style="font-size:11px;color:#555;margin-bottom:10px">${filtered.length} receipts · ${fmt(tot)}</div>
      ${rows||'<div style="text-align:center;color:#444;padding:30px 0;font-size:13px">No receipts found</div>'}
    </div>
  </div>`;
}

// ── Actions ────────────────────────────────────────────────────────────────
function openAdd(catId){ addCat=catId; addForm={date:today(),cat:catId,amount:'',vendor:'',notes:''}; modal='add'; render(); }
function openEmail(){ modal='email'; selQ=curQ(); render(); }
function openList(){ modal='list'; filterCat='all'; searchTxt=''; render(); }
function closeModal(){ modal=null; scanStep='pick'; scanResult=null; scanPreview=null; render(); }

function bindFileInputs(){
  document.querySelectorAll('input[type=file]').forEach(inp=>{
    inp.addEventListener('change', function(){ handleFile(this); });
  });
}

function handleFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    const b64 = e.target.result.split(',')[1];
    scanPreview = e.target.result;
    scanStep = 'scanning';
    render();
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:600,
          messages:[{role:'user', content:[
            {type:'image', source:{type:'base64', media_type:file.type||'image/jpeg', data:b64}},
            {type:'text', text:`Parse this receipt. Return ONLY JSON, no markdown:
{"vendor":"","amount":0.00,"date":"YYYY-MM-DD","cat":"${addCat}","notes":""}
cat: fuel|maint|tolls|meals|lodging|insure|permits|phone|scales|wash|amazon|supply|misc
Today: ${today()}`}
          ]}]
        })
      });
      const d = await res.json();
      const txt = d.content?.map(b=>b.text||'').join('')||'';
      scanResult = JSON.parse(txt.replace(/```json|```/g,'').trim());
      scanStep = 'done';
    } catch(err){ scanStep='err'; }
    render();
  };
  reader.readAsDataURL(file);
}

function saveScan(){
  if(!scanResult) return;
  const c = cat(scanResult.cat||addCat);
  receipts.unshift({id:Date.now(), date:scanResult.date||today(), cat:scanResult.cat||addCat, amount:parseFloat(scanResult.amount)||0, vendor:scanResult.vendor||'', notes:scanResult.notes||''});
  modal=null; scanStep='pick'; scanResult=null; scanPreview=null;
  render();
}

function saveManual(){
  if(!addForm.amount||!addForm.vendor) return;
  receipts.unshift({id:Date.now(), date:addForm.date, cat:addForm.cat, amount:parseFloat(addForm.amount), vendor:addForm.vendor, notes:addForm.notes});
  modal=null; render();
}

function deleteReceipt(id){ receipts=receipts.filter(r=>r.id!==id); render(); }

function sendEmail(){
  const yr = new Date().getFullYear();
  const q = QUARTERS[selQ];
  const qR = receipts.filter(r=>q.months.includes(new Date(r.date+'T12:00:00').getMonth()));
  const tot = qR.reduce((s,r)=>s+r.amount,0);
  const ded = qR.filter(r=>cat(r.cat)?.ded).reduce((s,r)=>s+r.amount,0);
  const catLines = CATS.map(c=>{
    const rows=qR.filter(r=>r.cat===c.id); const t=rows.reduce((s,r)=>s+r.amount,0);
    return t>0?`  ${c.icon} ${c.label.padEnd(22)} ${fmt(t).padStart(10)}  (${rows.length} receipt${rows.length>1?'s':''})`:null;
  }).filter(Boolean).join('\n');
  const detailLines = qR.map(r=>{const c=cat(r.cat); return `  ${r.date}  ${r.vendor.substring(0,22).padEnd(22)}  ${fmt(r.amount).padStart(9)}  ${c?.label}${r.notes?' — '+r.notes:''}`;}).join('\n');
  const subject = `${q.label} ${yr} Expense Report — Frank Mulkey, Owner Operator`;
  const body = `Hi Sherry,\n\nHere is my ${q.label} ${yr} expense report (${q.name} ${yr}).\n\n${'━'.repeat(34)}\nSUMMARY\n${'━'.repeat(34)}\n  Total Expenses:          ${fmt(tot)}\n  Tax Deductible:          ${fmt(ded)}\n  Non-Deductible:          ${fmt(tot-ded)}\n  Est. Tax Savings (25%):  ${fmt(ded*0.25)}\n  Total Receipts:          ${qR.length}\n\n${'━'.repeat(34)}\nBY CATEGORY\n${'━'.repeat(34)}\n${catLines}\n\n${'━'.repeat(34)}\nALL RECEIPTS\n${'━'.repeat(34)}\n${detailLines}\n\nPlease let me know if you need anything else.\n\nThank you,\nFrank Mulkey\nOwner Operator`;
  window.location.href = `mailto:${SHERRY}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

render();
</script>
