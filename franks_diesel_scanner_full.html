<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Frank's Diesel Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Arial Narrow',Arial,sans-serif;background:#F2F0ED;min-height:100vh;max-width:480px;margin:0 auto}
button:active{transform:scale(0.96)}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
select option{background:#111}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Top bar */
#topbar{background:#1C1008;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
#appTitle{font-size:18px;font-weight:900;color:#FF6B35;letter-spacing:2px;text-transform:uppercase}
#appSub{font-size:10px;color:#555;letter-spacing:1px}
#receiptsBtn{background:#2A1200;border:1px solid #FF6B35;border-radius:8px;color:#FF6B35;padding:7px 11px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase}

/* Stats strip */
#statsStrip{background:#222;display:flex;padding:10px 14px;gap:8px;border-bottom:1px solid #2A2A2A}
.stat{flex:1}
.statLabel{font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase}
.statVal{font-size:18px;font-weight:900}
.statSub{font-size:9px;color:#444}
#statDivider{width:1px;background:#333}
#emailSherryBtn{background:#0E1A0E;border:1px solid #2A5A2A;border-radius:8px;color:#4ECDC4;padding:8px 10px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;line-height:1.3;width:100%;display:block}

/* Grid section */
#gridLabel{padding:12px 16px 6px;font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;font-weight:700}
#catGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 10px 90px}
.catCard{background:#fff;border:2px solid #E8E4E0;border-radius:14px;padding:16px 6px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:0 1px 4px rgba(0,0,0,0.06);position:relative;min-height:105px;width:100%}
.catBadge{position:absolute;top:7px;right:7px;border-radius:10px;font-size:9px;font-weight:900;padding:2px 6px;line-height:1.4;color:#000}
.catIcon{font-size:32px}
.catName{font-size:11px;font-weight:700;color:#333;text-align:center;line-height:1.3}
.catAmt{font-size:10px;font-weight:700}
.catEmpty{font-size:10px;color:#CCC}

/* Floating cam btn */
#floatCam{position:fixed;bottom:22px;right:22px;width:62px;height:62px;border-radius:31px;background:#FF6B35;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,53,0.5);display:flex;align-items:center;justify-content:center;z-index:50}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease}
.sheet{background:#1A1A1A;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px;border:1px solid #2A2A2A;border-bottom:none;max-height:88vh;overflow-y:auto}
.sheetTitle{font-size:16px;font-weight:900;color:#FF6B35;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.sheetHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.closeBtn{background:none;border:none;color:#666;font-size:22px;cursor:pointer;padding:0;line-height:1}
.lbl{font-size:10px;color:#777;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px}
.inp{width:100%;padding:11px 12px;background:#111;border:1px solid #3A3A3A;border-radius:8px;color:#EEE8E0;font-size:14px;box-sizing:border-box}
.inp:focus{outline:none;border-color:#FF6B35}
.mbtn{width:100%;padding:13px;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-bottom:8px;display:block;font-family:inherit}
.divider{display:flex;align-items:center;gap:8px;color:#333;margin-bottom:14px}
.divLine{flex:1;height:1px;background:#2A2A2A}
.divText{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555}
.catPillWrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.catPill{padding:5px 10px;border-radius:20px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.previewImg{width:100%;border-radius:8px;margin-bottom:12px;max-height:160px;object-fit:cover;display:block}
.resultBox{background:#0D2010;border:1px solid #4ECDC4;border-radius:8px;padding:12px;margin-bottom:14px}
.resultRow{font-size:13px;color:#CCC;margin-bottom:2px}
.filterPills{display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;padding-bottom:4px}
.fPill{padding:5px 12px;border-radius:20px;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.receiptRow{border-radius:8px;padding:10px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:flex-start}
.receiptRowLeft{flex:1}
.receiptVendor{font-size:13px;font-weight:700;color:#EEE}
.receiptMeta{font-size:10px;color:#555;margin-top:2px}
.receiptNotes{font-size:11px;color:#666;margin-top:2px}
.receiptDed{font-size:9px;color:#4ECDC4;margin-top:2px}
.receiptAmt{font-size:16px;font-weight:900;color:#EEE;text-align:right}
.removeBtn{font-size:10px;color:#555;background:none;border:none;cursor:pointer;padding:0;margin-top:3px;display:block;width:100%;text-align:right}
.noResults{text-align:center;color:#444;padding:30px 0;font-size:13px}

/* API key bar */
#apiKeyBar{background:#2A1200;padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #3A2000}
#apiKeyBar input{flex:1;padding:7px 10px;background:#111;border:1px solid #3A3A3A;border-radius:6px;color:#EEE8E0;font-size:12px}
#apiKeyBar input:focus{outline:none;border-color:#FF6B35}
#saveKeyBtn{padding:7px 12px;background:#FF6B35;border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
#keyStatus{font-size:10px;color:#4ECDC4;white-space:nowrap}
</style>
</head>

</div>

function resetScan() {
  scanState.step = 'pick';
  scanState.preview = null;
  scanState.result = null;
  renderScan();
}

async function handleScanFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const b64 = ev.target.result.split(",")[1];
    scanState.preview = ev.target.result;
    scanState.step = 'scanning';
    renderScan();
    try {
      if (!geminiKey) throw new Error('No API key');
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          contents:[{parts:[
            {inline_data:{mime_type:file.type||"image/jpeg",data:b64}},
            {text:`Parse this receipt. Return ONLY valid JSON, no markdown:
{"vendor":"","address":"","amount":0.00,"date":"YYYY-MM-DD","gallons":null,"price_per_gallon":null,"cat":"${scanState.catId}","notes":""}
cat options: fuel|maint|tolls|meals|lodging|insure|permits|phone|scales|wash|amazon|supply|misc
For fuel receipts extract gallons and price_per_gallon if visible, otherwise use null.
Today: ${today()}`}
          ]}]
        })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      const txt = d.candidates?.[0]?.content?.parts?.[0]?.text || '';
      scanState.result = JSON.parse(txt.replace(/```json|```/g,'').trim());
      scanState.step = 'done';
    } catch(err) {
      console.error(err);
      scanState.step = 'err';
    }
    renderScan();
  };
  reader.readAsDataURL(file);
}

function saveScanResult() {
  const r = scanState.result;
  if (!r) return;

  // Duplicate check — same vendor, amount, and date
  const duplicate = receipts.find(x =>
    x.vendor.toLowerCase() === (r.vendor||'').toLowerCase() &&
    Math.abs(x.amount - parseFloat(r.amount)) < 0.01 &&
    x.date === r.date
  );

  if (duplicate) {
    const confirmSave = confirm(
      `⚠️ Duplicate Receipt!\n\nYou already have a receipt from ${r.vendor} for ${fmt(parseFloat(r.amount))} on ${r.date}.\n\nSave anyway?`
    );
    if (!confirmSave) return;
  }

  receipts.unshift({
    id: Date.now(),
    date: r.date || today(),
    cat: r.cat || scanState.catId,
    amount: parseFloat(r.amount) || 0,
    vendor: r.vendor || '',
    notes: r.notes || ''
  });
  refresh();
  closeModal();
}
